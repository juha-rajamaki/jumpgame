<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Platform Hopper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #E8F0FE;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}
#wrap { position: fixed; inset: 0; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; }

/* Modal overlay */
#modal {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}
#modal.show { opacity: 1; pointer-events: auto; }
.card {
    background: #fff;
    border-radius: 22px;
    border: 1px solid rgba(79, 70, 229, 0.15);
    padding: 32px 26px 26px;
    text-align: center;
    max-width: 320px; width: 85%;
    box-shadow: 0 24px 50px rgba(15, 23, 42, 0.2), 0 0 0 6px rgba(255,255,255,0.5);
    transform: translateY(14px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#modal.show .card { transform: translateY(0) scale(1); }
.card h2 {
    font-size: 21px; font-weight: 800;
    color: #0f172a; margin-bottom: 12px;
    letter-spacing: -0.4px;
}
.card p {
    font-size: 20px; color: #64748b;
    font-weight: 600;
    margin-bottom: 22px; line-height: 1.5;
}
.btn {
    display: block; width: 100%;
    padding: 13px 0; border: none; border-radius: 13px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
    background: #4f46e5; color: #fff;
}
.btn:active { transform: scale(0.96); }
.avatar {
    width: 64px; height: 64px;
    margin: -48px auto 10px;
}
.avatar svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 10px rgba(79,70,229,0.25)); }
.detail {
    font-size: 13px; color: #9AA8BD;
    margin-bottom: 18px !important; line-height: 1.4;
}
</style>
</head>
<body>
<div id="wrap">
    <canvas id="gc"></canvas>
    <div id="modal">
        <div class="card">
            <div class="avatar" id="modal-avatar">
                <svg viewBox="0 0 60 60">
                    <rect width="60" height="60" rx="12" fill="#4f46e5"/>
                    <circle cx="18" cy="25" r="8" fill="#fff"/>
                    <circle cx="42" cy="25" r="8" fill="#fff"/>
                    <circle id="av-pupil-l" cx="18" cy="25" r="4" fill="#312e81"/>
                    <circle id="av-pupil-r" cx="42" cy="25" r="4" fill="#312e81"/>
                    <path id="av-mouth" d="M22 42 Q30 42 38 42" stroke="#312e81" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <h2 id="mt"></h2>
            <p id="ms"></p>
            <p id="mdetail" class="detail"></p>
            <button class="btn" id="mb"></button>
        </div>
    </div>
</div>
<script>
/* ═══════════════════════════════════════════════
   Platform Hopper — Hold to charge, release to jump
   Land on 50 platforms to win!
   ═══════════════════════════════════════════════ */

// ── Configuration ──
const THEME = {
    bg: '#E8F0FE',
    char: { w: 26, h: 26, color: '#4f46e5', eyeWhite: '#fff', pupil: '#312e81' },
    plat: { height: 7, color: '#8B9CB6', startW: 110 },
    ui: {
        scoreColor: '#1e293b',
        dimColor: '#8B9CB6',
        perfectColor: '#10b981',
        lifeColor: '#ef4444',
        streakOff: '#a7d8c0',
        hintColor: 'rgba(100,116,139,0.5)',
    },
};

const PHYSICS = {
    gravity: 2200,
    maxVX: 580,
    maxVY: 1050,
    minVY: 240,
    chargeTime: 1.1,
    minPower: 0.07,
};

const TOTAL_JUMPS = 50;
const PERFECT_ZONE = 0.22;
const PERFECTS_FOR_LIFE = 3;

// Difficulty tiers — blended by jump number
const TIERS = [
    { n: 5,   gMin: 22, gMax: 45,  dyMin: -5,  dyMax: 8,  pMin: 95, pMax: 120 },
    { n: 10,  gMin: 35, gMax: 72,  dyMin: -15, dyMax: 20, pMin: 80, pMax: 110 },
    { n: 20,  gMin: 40, gMax: 100, dyMin: -28, dyMax: 32, pMin: 65, pMax: 100 },
    { n: 30,  gMin: 44, gMax: 130, dyMin: -42, dyMax: 40, pMin: 52, pMax: 88 },
    { n: 40,  gMin: 50, gMax: 160, dyMin: -55, dyMax: 48, pMin: 42, pMax: 72 },
    { n: 45,  gMin: 55, gMax: 178, dyMin: -60, dyMax: 52, pMin: 36, pMax: 60 },
    { n: 48,  gMin: 60, gMax: 192, dyMin: -64, dyMax: 56, pMin: 30, pMax: 50 },
    { n: 50,  gMin: 180, gMax: 200, dyMin: -10, dyMax: 20, pMin: 26, pMax: 34 },
    { n: 51,  gMin: 180, gMax: 200, dyMin: -10, dyMax: 20, pMin: 26, pMax: 34 },
];

function lerp(a, b, t) { return a + (b - a) * t; }

function getDiff(n) {
    let prev = TIERS[0];
    for (let i = 0; i < TIERS.length; i++) {
        const tier = TIERS[i];
        if (n <= tier.n) {
            const pn = i === 0 ? 0 : TIERS[i - 1].n;
            const t = (n - pn) / (tier.n - pn);
            prev = i === 0 ? tier : TIERS[i - 1];
            return {
                gMin: lerp(prev.gMin, tier.gMin, t), gMax: lerp(prev.gMax, tier.gMax, t),
                dyMin: lerp(prev.dyMin, tier.dyMin, t), dyMax: lerp(prev.dyMax, tier.dyMax, t),
                pMin: lerp(prev.pMin, tier.pMin, t), pMax: lerp(prev.pMax, tier.pMax, t),
            };
        }
    }
    const last = TIERS[TIERS.length - 1];
    return { gMin: last.gMin, gMax: last.gMax, dyMin: last.dyMin, dyMax: last.dyMax, pMin: last.pMin, pMax: last.pMax };
}

// ── Canvas & state ──
const cv = document.getElementById('gc');
const ctx = cv.getContext('2d');
const modal = document.getElementById('modal');
const mTitle = document.getElementById('mt');
const mSub = document.getElementById('ms');
const mBtn = document.getElementById('mb');
const mDetail = document.getElementById('mdetail');
const mAvatar = document.getElementById('modal-avatar');
const avMouth = document.getElementById('av-mouth');
const avPL = document.getElementById('av-pupil-l');
const avPR = document.getElementById('av-pupil-r');
const hasKB = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

let W, H, S, fonts;
let state, player, platforms, cam, power, streak, lives, remaining;
let completed, firstPlay, floats, ringPulse, lastTS, fadeOutIdx;
let missedJump, smileT, wowT, wowDir, shakeT, inputBuf;
let hudFade, winOpen, attempts;

// Load attempts
try { attempts = JSON.parse(localStorage.getItem('ph_att')) || { cur: 0, total: 0 }; } catch(_) { attempts = { cur: 0, total: 0 }; }
function saveAtt() { try { localStorage.setItem('ph_att', JSON.stringify(attempts)); } catch(_) {} }

// ── Audio ──
let audioCtx = null;
function initAudio() {
    if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_) {}
}

function tone(freq, type, dur, vol, delay) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol * 0.8, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur + 0.01);
}

function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

function sfxJump() { vib(10); if (!audioCtx) return; const t=audioCtx.currentTime; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(310,t); o.frequency.exponentialRampToValueAtTime(560,t+0.07); o.frequency.exponentialRampToValueAtTime(430,t+0.12); g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.14); o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.15); }
function sfxLand() { vib(12); tone(380, 'sine', 0.05, 0.18); }
function sfxPerfect(s) { vib([12,30,12]); const base = [520,580][Math.min(s-1,1)]; [1,1.25,1.5].forEach((r,i) => { tone(base*r, i===0?'sine':'triangle', 0.3+s*0.05, (0.22-i*0.04), i*0.04); }); }
function sfxLife() { vib([15,30,15,30,25]); [1,1.25,1.5,2].forEach((r,i) => { tone(640*r, i===0?'sine':'triangle', 0.6, (0.3-i*0.06), i*0.04); }); }
function sfxWin() { vib([15,40,15,40,25]); [520,660,780,1040].forEach((f,i) => { [1,1.5].forEach((r,j) => { tone(f*r, j===0?'sine':'triangle', 0.8, (0.25-j*0.05), i*0.12); }); }); }
function sfxDie() { vib(120); tone(390,'sine',0.22,0.28); tone(320,'triangle',0.22,0.26,0.18); tone(270,'sine',0.22,0.26,0.36); tone(210,'triangle',0.4,0.32,0.54); }
function sfxLoseLife() { vib(60); tone(510,'sine',0.15,0.26); tone(380,'triangle',0.2,0.24,0.12); }

// ── Utilities ──
function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function rr(c, x, y, w, h, r) {
    r = Math.min(r, h / 2, w / 2);
    if (r < 0) r = 0;
    c.moveTo(x + r, y); c.lineTo(x + w - r, y);
    c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
    c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
    c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r);
    c.arcTo(x, y, x + r, y, r); c.closePath();
}

// ── Resize ──
function resize() {
    const r = cv.parentElement.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const prevS = S;
    W = r.width; H = r.height;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    S = Math.min(Math.min(W, H) / 295, 1.7);

    const ff = '-apple-system, system-ui, sans-serif';
    fonts = {
        score: '800 ' + (36 * S) + 'px ' + ff,
        sub: '600 ' + (11 * S) + 'px ' + ff,
        lives: (16 * S) + 'px ' + ff,
        streak: '700 ' + (10 * S) + 'px ' + ff,
        hint: '500 ' + (11 * S) + 'px ' + ff,
        fPx: S,
    };

    if (prevS && prevS > 0 && platforms && platforms.length > 0) {
        const sr = S / prevS;
        if (sr !== 1) {
            for (const p of platforms) { p.x *= sr; p.w *= sr; p.y = p.yRatio * H; }
            player.x *= sr;
            if (state === 'jumping' || state === 'falling') {
                player.y *= (H / (H / 1)); // keep proportional
                player.vx *= sr; player.vy *= sr;
            } else {
                player.y = platforms[player.pi].y - THEME.char.h * S;
            }
            cam.x *= sr; cam.start *= sr;
            setCamTarget();
            if (state !== 'panning') cam.x = cam.target;
            for (const f of floats) { f.x *= sr; }
            fillPlatforms(cam.x);
        }
    }
}

// ── Platform generation ──
function genPlat(prev, n) {
    const d = getDiff(n);
    const dy = rand(d.dyMin, d.dyMax) * S;
    const upPen = Math.max(0, -dy / S);
    const gMax = Math.max(d.gMin + 15, d.gMax - upPen * 1.8);
    const gap = rand(d.gMin, gMax) * S;
    const w = rand(d.pMin, d.pMax) * S;
    let y = prev.y + dy;
    y = clamp(y, H * 0.35, H * 0.72);
    return { x: prev.x + prev.w + gap, y, w, yRatio: y / H };
}

function fillPlatforms(camX) {
    const edge = camX + W + 400 * S;
    while (platforms[platforms.length - 1].x < edge) {
        platforms.push(genPlat(platforms[platforms.length - 1], platforms.length));
    }
}

function setCamTarget() {
    const cur = platforms[player.pi];
    const next = platforms[player.pi + 1];
    if (!next) { cam.target = cur.x + cur.w / 2 - W / 2; return; }
    cam.target = (cur.x + next.x + next.w) / 2 - W / 2;
}

function startPan() {
    cam.start = cam.x;
    setCamTarget();
    cam.progress = 0;
    const dist = Math.abs(cam.target - cam.start);
    cam.dur = clamp(dist / (W * 1.1), 0.7, 0.95);
}

// ── Init ──
function init() {
    resize();
    state = 'idle';
    power = 0; streak = 0; lives = 0;
    completed = false;
    remaining = TOTAL_JUMPS;
    attempts.cur++;
    attempts.total++;
    saveAtt();
    try { firstPlay = !localStorage.getItem('ph_played'); } catch(_) { firstPlay = false; }
    fadeOutIdx = -1; lastTS = 0;
    missedJump = false;
    hudFade = 1; winOpen = false;
    smileT = 0; wowT = 0; wowDir = 1; shakeT = 0; inputBuf = false;
    floats = []; ringPulse = null;

    const y0 = H * 0.6;
    platforms = [{ x: 25 * S, y: y0, w: THEME.plat.startW * S, yRatio: y0 / H }];
    fillPlatforms(25 * S);

    const p0 = platforms[0];
    player = {
        x: p0.x + p0.w * 0.4 - THEME.char.w * S / 2,
        y: p0.y - THEME.char.h * S,
        vx: 0, vy: 0, pi: 0,
    };

    cam = { x: 0, target: 0, start: 0, progress: 1, dur: 0.45 };
    setCamTarget();
    cam.x = cam.target;
    modal.classList.remove('show');
}

// ── Update ──
function update(dt) {
    if (dt > 0.1) dt = 0.1;
    if (state === 'gameover') { if (hudFade > 0) hudFade = Math.max(0, hudFade - dt * 10); return; }

    if (state === 'charging') power = Math.min(1, power + dt / PHYSICS.chargeTime);
    if (wowT > 0) wowT = Math.max(0, wowT - dt);
    if (shakeT > 0) shakeT = Math.max(0, shakeT - dt);
    if (smileT > 0 && smileT !== Infinity) smileT = Math.max(0, smileT - dt);

    if (state === 'jumping' || state === 'falling') {
        const prevY = player.y;
        player.vy += PHYSICS.gravity * S * dt;
        player.x += player.vx * dt;
        player.y += player.vy * dt;

        const cw = THEME.char.w * S;
        const ch = THEME.char.h * S;
        const cx = player.x + cw / 2;
        const bot = player.y + ch;
        const prevBot = prevY + ch;

        if (state === 'jumping' && player.vy > 0) {
            // Land on current platform (short jump back)
            const cur = platforms[player.pi];
            if (cx >= cur.x && cx <= cur.x + cur.w &&
                prevBot <= cur.y + 2 * S && bot >= cur.y - 2 * S &&
                bot <= cur.y + Math.max(Math.abs(player.vy * dt), 8 * S)) {
                player.y = cur.y - ch;
                player.vx = 0; player.vy = 0;
                streak = 0;
                if (smileT === Infinity) smileT = 0.15;
                sfxLand();
                state = inputBuf ? (inputBuf = false, power = 0, 'charging') : 'idle';
                return;
            }
            // Land on next platform
            const ni = player.pi + 1;
            if (ni < platforms.length) {
                const np = platforms[ni];
                const tol = Math.max(Math.abs(player.vy * dt), 8 * S);
                if (cx >= np.x && cx <= np.x + np.w &&
                    prevBot <= np.y + 2 * S && bot >= np.y - 2 * S &&
                    bot <= np.y + tol) {
                    onLand(np, ni);
                    return;
                }
            }
        }

        // Fell off screen
        if (bot > H + 100 * S) {
            missedJump = true;
            if (lives > 0) {
                lives--;
                sfxLoseLife();
                respawn();
            } else {
                state = 'gameover';
                sfxDie();
                showGameOver();
            }
        }
    }

    // Camera pan
    if (cam.progress < 1) {
        cam.progress += dt / cam.dur;
        if (cam.progress >= 1) {
            cam.progress = 1;
            cam.x = cam.target;
            fadeOutIdx = -1;
            if (state === 'panning') state = 'idle';
        } else {
            cam.x = cam.start + (cam.target - cam.start) * easeOut(cam.progress);
        }
    }

    // Floats cleanup
    for (let i = floats.length - 1; i >= 0; i--) {
        floats[i].age += dt;
        if (floats[i].age >= floats[i].dur) { floats[i] = floats[floats.length - 1]; floats.pop(); }
    }

    if (ringPulse) { ringPulse.age += dt; if (ringPulse.age >= ringPulse.dur) ringPulse = null; }
}

function onLand(plat, idx) {
    const ch = THEME.char.h * S;
    const cw = THEME.char.w * S;
    fadeOutIdx = player.pi;
    player.y = plat.y - ch;
    player.vx = 0; player.vy = 0;
    player.pi = idx;
    firstPlay = false;
    try { localStorage.setItem('ph_played', '1'); } catch(_) {}

    remaining--;
    if (remaining <= 0) { remaining = 0; completed = true; }

    const cx = player.x + cw / 2;
    const pcx = plat.x + plat.w / 2;
    const isPerfect = Math.abs(cx - pcx) <= plat.w * PERFECT_ZONE / 2;

    if (isPerfect) {
        streak++;
        smileT = Infinity;
        const isLife = streak >= PERFECTS_FOR_LIFE;
        const pColor = isLife ? '#f59e0b' : THEME.ui.perfectColor;
        ringPulse = { x: cx, y: player.y + ch / 2, color: pColor, age: 0, dur: 0.45, maxR: 40 * S };
        if (isLife) {
            lives++; streak = 0;
            addFloat('+1 LIFE', cx, plat.y - 30 * S, '#f59e0b', 16, 1.0);
            sfxLife();
        } else {
            addFloat('PERFECT!', cx, plat.y - 30 * S, THEME.ui.perfectColor, 16, 1.0);
            sfxPerfect(streak);
        }
    } else {
        streak = 0;
        if (smileT === Infinity) smileT = 0.15;
        const dL = cx - plat.x;
        const dR = plat.x + plat.w - cx;
        if (Math.min(dL, dR) < plat.w * 0.12) { wowT = 1.2; wowDir = dL < dR ? -1 : 1; shakeT = 0.45; }
        sfxLand();
    }

    if (completed) { showWin(); }
    fillPlatforms(plat.x);
    startPan();
    if (inputBuf) { state = 'charging'; power = 0; inputBuf = false; }
    else { state = 'panning'; }
}

function respawn() {
    const p = platforms[player.pi];
    const cw = THEME.char.w * S;
    const ch = THEME.char.h * S;
    player.x = p.x + p.w * 0.4 - cw / 2;
    player.y = p.y - ch;
    player.vx = 0; player.vy = 0;
    state = 'idle'; power = 0; streak = 0;
    addFloat('-1 LIFE', player.x + cw / 2, player.y - 10 * S, THEME.ui.lifeColor, 16, 1.3);
}

// ── Render ──
function render() {
    // Background
    ctx.fillStyle = THEME.bg;
    ctx.fillRect(0, 0, W, H);

    // Platforms behind
    for (let i = player.pi - 1; i >= 0; i--) {
        const sx = platforms[i].x - cam.x;
        if (sx + platforms[i].w < -30) break;
        drawPlat(platforms[i]);
    }
    // Current
    drawPlat(platforms[player.pi]);
    // Next (drop-in animation)
    if (player.pi + 1 < platforms.length) {
        if (fadeOutIdx >= 0 && cam.progress < 1) {
            const t = easeOut(cam.progress);
            const drop = (1 - t) * H * 0.4;
            ctx.save(); ctx.translate(0, -drop);
            drawPlat(platforms[player.pi + 1]);
            ctx.restore();
        } else {
            drawPlat(platforms[player.pi + 1]);
        }
    }

    drawRing();
    drawChar();
    drawHUD();
    drawFloats();
    if (firstPlay && state === 'idle') drawHint();
}

function drawPlat(p) {
    const sx = p.x - cam.x;
    if (sx + p.w < -30 || sx > W + 30) return;
    const h = THEME.plat.height * S;
    ctx.fillStyle = THEME.plat.color;
    ctx.beginPath(); rr(ctx, sx, p.y, p.w, h, 3.5 * S); ctx.fill();
}

function drawChar() {
    const cw = THEME.char.w * S;
    const ch = THEME.char.h * S;
    const sx = player.x - cam.x;
    const sy = player.y;

    ctx.save();
    ctx.translate(sx + cw / 2, sy + ch);

    let scX = 1, scY = 1;
    if (state === 'charging') { scX = 1 + power * 0.5; scY = 1 - power * 0.5; }
    else if (state === 'jumping' || state === 'falling') {
        if (player.vy < 0) { scX = 0.85; scY = 1.15; }
        else { scX = 1.1; scY = 0.9; }
    }
    ctx.scale(scX, scY);

    if (shakeT > 0) {
        const t = 1 - shakeT / 0.45;
        const decay = 1 - t;
        ctx.rotate(Math.sin(t * Math.PI * 8) * decay * 0.18);
    }

    // Body
    ctx.fillStyle = THEME.char.color;
    ctx.beginPath(); rr(ctx, -cw / 2, -ch, cw, ch, 5.5 * S); ctx.fill();

    // Eyes
    const es = 3.5 * S, ey = -ch * 0.58, esp = cw * 0.2;
    const lx = (state === 'jumping' || state === 'charging' || state === 'falling') ? 1.2 * S : 0.5 * S;
    const ly = (state === 'jumping' && player.vy < 0) ? -0.5 * S : 0.3 * S;
    ctx.fillStyle = THEME.char.eyeWhite;
    ctx.beginPath(); ctx.arc(-esp, ey, es, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(esp, ey, es, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = THEME.char.pupil;
    ctx.beginPath(); ctx.arc(-esp + lx, ey + ly, es * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(esp + lx, ey + ly, es * 0.5, 0, Math.PI * 2); ctx.fill();

    // Mouth
    const mY = -ch * 0.24, mW = cw * 0.15;
    ctx.strokeStyle = THEME.char.pupil;
    ctx.lineCap = 'round';
    if (wowT > 0) {
        const oR = 1.8 * S * Math.min(1, wowT / 0.12);
        ctx.fillStyle = THEME.char.pupil;
        ctx.beginPath(); ctx.arc(0, mY + S, oR, 0, Math.PI * 2); ctx.fill();
    } else {
        const sd = smileT > 0 ? Math.min(1, smileT / 0.15) * 3.5 * S : 0;
        ctx.lineWidth = 1.4 * S;
        ctx.beginPath(); ctx.moveTo(-mW, mY); ctx.quadraticCurveTo(0, mY + sd, mW, mY); ctx.stroke();
    }
    ctx.restore();
}

function drawHUD() {
    if (state === 'gameover' && hudFade <= 0) return;
    if (winOpen) return;
    ctx.save();
    if (state === 'gameover') ctx.globalAlpha = hudFade;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';

    let yPos = 28 * S;
    ctx.font = fonts.score; ctx.fillStyle = THEME.ui.scoreColor;
    ctx.fillText(remaining, W / 2, yPos);
    yPos += 38 * S;
    ctx.font = fonts.sub; ctx.fillStyle = THEME.ui.dimColor;
    ctx.fillText('jumps remaining', W / 2, yPos);
    yPos += 14 * S;

    if (lives > 0) {
        ctx.font = fonts.lives; ctx.fillStyle = THEME.ui.lifeColor;
        ctx.fillText('\u2665'.repeat(lives), W / 2, yPos);
        yPos += 20 * S;
    }

    if (streak > 0 && streak < PERFECTS_FOR_LIFE) {
        ctx.font = fonts.streak; ctx.textAlign = 'left';
        const dotSp = ctx.measureText('\u2B24 ').width;
        const totalW = dotSp * PERFECTS_FOR_LIFE - ctx.measureText(' ').width;
        let dx = W / 2 - totalW / 2;
        for (let i = 0; i < PERFECTS_FOR_LIFE; i++) {
            ctx.fillStyle = i < streak ? THEME.ui.perfectColor : THEME.ui.streakOff;
            ctx.fillText(i < streak ? '\u2B24' : '\u25CB', dx, yPos);
            dx += dotSp;
        }
    }
    ctx.restore();
}

function drawRing() {
    if (!ringPulse) return;
    const t = ringPulse.age / ringPulse.dur;
    const r = ringPulse.maxR * easeOut(t);
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = ringPulse.color;
    ctx.lineWidth = (3 - 2 * t) * S;
    ctx.beginPath(); ctx.arc(ringPulse.x - cam.x, ringPulse.y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
}

function drawFloats() {
    for (const f of floats) {
        const t = f.age / f.dur;
        const alpha = t < 0.12 ? t / 0.12 : Math.max(0, 1 - (t - 0.12) / 0.88);
        const yOff = -28 * S * t;
        ctx.globalAlpha = alpha;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = f.fs || (f.fs = '800 ' + (f.size * fonts.fPx) + 'px -apple-system, system-ui, sans-serif');
        ctx.fillStyle = f.color;
        ctx.fillText(f.text, f.x - cam.x, f.y + yOff);
    }
    ctx.globalAlpha = 1;
}

function drawHint() {
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.font = fonts.hint; ctx.fillStyle = THEME.ui.hintColor;
    const msg = hasKB ? 'Hold spacebar, then release to jump' : 'Hold and release to jump';
    ctx.fillText(msg, player.x + THEME.char.w * S / 2 - cam.x, player.y - 18 * S);
}

function addFloat(text, x, y, color, size, dur) {
    floats.push({ text, x, y, color, size, dur, age: 0 });
}

// ── Overlays ──
function setFace(mood) {
    if (mood === 'happy') {
        avPL.setAttribute('cx', '19.5'); avPL.setAttribute('cy', '24');
        avPR.setAttribute('cx', '43.5'); avPR.setAttribute('cy', '24');
        avMouth.setAttribute('d', 'M17 39 Q30 52 43 39');
    } else {
        avPL.setAttribute('cx', '17'); avPL.setAttribute('cy', '27');
        avPR.setAttribute('cx', '41'); avPR.setAttribute('cy', '27');
        avMouth.setAttribute('d', 'M22 44 Q30 39 38 44');
    }
}

function showGameOver() {
    winOpen = false;
    const done = TOTAL_JUMPS - remaining;
    mAvatar.style.display = 'block'; setFace('sad');
    mTitle.textContent = 'Game Over';
    mSub.innerHTML = 'You made it<br>' + done + ' of ' + TOTAL_JUMPS + ' jumps';
    mDetail.textContent = 'Attempt #' + attempts.cur;
    mDetail.style.display = '';
    mBtn.textContent = 'Retry';
    mBtn.onclick = restart;
    modal.classList.add('show');
}

function showWin() {
    sfxWin();
    winOpen = true;
    mAvatar.style.display = 'block'; setFace('happy');
    mTitle.textContent = 'You did it!';
    mSub.textContent = attempts.cur + (attempts.cur === 1 ? ' attempt' : ' attempts');
    mDetail.textContent = '';
    mDetail.style.display = 'none';
    mBtn.textContent = 'Play Again';
    mBtn.onclick = function () {
        attempts.cur = 0; saveAtt();
        modal.classList.remove('show');
        winOpen = false;
        restart();
    };
    modal.classList.add('show');
}

function restart() {
    init();
    lastTS = 0;
}

// ── Input ──
function onDown(e) {
    e.preventDefault();
    initAudio();
    if (state === 'gameover') { restart(); return; }
    if (modal.classList.contains('show')) return;
    if (state === 'idle' || state === 'panning' || state === 'landed') {
        if (state === 'landed') startPan();
        state = 'charging'; power = 0;
    } else if (state === 'jumping') {
        inputBuf = true;
    }
}

function onUp(e) {
    e.preventDefault();
    if (state !== 'charging') { inputBuf = false; return; }
    sfxJump();
    const pw = Math.max(PHYSICS.minPower, power);
    player.vx = pw * PHYSICS.maxVX * S;
    player.vy = -(PHYSICS.minVY + pw * (PHYSICS.maxVY - PHYSICS.minVY)) * S;
    state = 'jumping'; power = 0;
}

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchend', onUp, { passive: false });
cv.addEventListener('touchcancel', onUp, { passive: false });
document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

let lastTouch = 0;
document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
}, { passive: false });

modal.addEventListener('click', function() {
    if (modal.classList.contains('show') && !winOpen) mBtn.click();
});
modal.addEventListener('touchend', function(e) {
    if (modal.classList.contains('show') && !winOpen) { e.preventDefault(); mBtn.click(); }
}, { passive: false });

document.addEventListener('keydown', function(e) {
    if (e.code !== 'Space') return;
    e.preventDefault();
    if (e.repeat) return;
    if (modal.classList.contains('show')) { if (!winOpen) mBtn.click(); return; }
    onDown(e);
});
document.addEventListener('keyup', function(e) {
    if (e.code !== 'Space') return;
    onUp(e);
});

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function() { setTimeout(resize, 100); });

// ── Game loop ──
function loop(ts) {
    if (!lastTS) lastTS = ts;
    const dt = (ts - lastTS) / 1000;
    lastTS = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
